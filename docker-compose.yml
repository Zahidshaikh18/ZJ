services:
  mongodb:
    image: mongo:7
    container_name: zj-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: zj-api
    depends_on:
      - mongodb
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: zj-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    restart: unless-stopped

volumes:
  mongodb_data: